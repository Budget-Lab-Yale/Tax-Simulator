name: Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - name: Install dependencies
        run: |
          install.packages(c("dplyr", "tidyverse"), repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Run unit tests
        run: |
          for test_file in src/tests/test_*.R; do
            if [ "$test_file" = "src/tests/test_taxsim.R" ]; then
              echo "Skipping $test_file (requires microdata + TAXSIM)"
              continue
            fi
            echo "Running $test_file"
            Rscript "$test_file"
          done
