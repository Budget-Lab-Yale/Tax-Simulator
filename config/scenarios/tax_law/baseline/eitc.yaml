  value: 5000
  i_measure: default
  i_base_year: 2008
  i_direction: default
  i_increment: default

# Maximim allowable investment income for credit eligibility
inv_inc_limit:
  value: 
    '2014': 2200
    '2021': 10000
  i_measure: default
  i_base_year: 
    '2014': 1995
    '2021': 2020
  i_direction: -1
  i_increment: 50

# Minimum age for credit eligibility
min_age:
  value: 
    '2014': 25
    '2021': 19
    '2022': 25

# Maximum age for credit eligibility
max_age:
  value:
    '2014': 64
    '2021': Inf
    '2022': 64
    
# Whether credit is available for married filing separately returns   
mfs_eligible:
  value: 0

# Whether parents are required to pre-certify their eligibility
