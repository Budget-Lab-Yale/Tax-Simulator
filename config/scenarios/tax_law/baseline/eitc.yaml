  i_measure: default
  i_base_year: default
  i_direction: default
  i_increment: default

# Earned income threshold at which credit is maximized for filers with 3+ children 
pi_end_3:
  value: 8890
  i_measure: default
  i_base_year: default
  i_direction: default
  i_increment: default

# AGI threshold at which credit begins phasing out for filers with no children
po_thresh_0:
  value: 
    '2014': 5280
    '2021': 11610
    '2022': 5280
  i_measure: 
  i_base_year:
    '2014': 1995
    '2021': 2020
    '2022': 1995
  i_direction: default
  i_increment: default

# AGI threshold at which credit begins phasing out for filers with 1 child
