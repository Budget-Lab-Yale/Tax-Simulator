---
indexation_defaults:
  i_measure:
    '1987': cpi
  i_base_year: 2025
  i_direction: -1
  i_increment: 1

filing_status_mapper:
  threshold1:
    '1': threshold_single1 * 1
    '2': threshold_single1 * 1.5
    '3': threshold_single1 * 1
    '4': threshold_single1 * 1
  threshold2:
    '1': threshold_single2 * 1
    '2': threshold_single2 * 1.5
    '3': threshold_single2 * 1
    '4': threshold_single2 * 1
  threshold3:
    '1': threshold_single3 * 1
    '2': threshold_single3 * 1.5
    '3': threshold_single3 * 1
    '4': threshold_single3 * 1

# AGI threshold for first bracket
threshold_single1:
  value: 1000000
  i_measure: default
  i_base_year: default
  i_direction: default
  i_increment: default

# Surtax rate for first bracket
rate1:
  value:
    '2014': 0.0
    '2026': 0.05

# AGI threshold for second bracket
threshold_single2:
  value:
    '2014': 5000000
    '2026': 2000000
  i_measure: default
  i_base_year: default
  i_direction: default
  i_increment: default

# Surtax rate for second bracket
rate2:
  value:
    '2014': 0.0
    '2026': 0.10

# AGI threshold for third bracket
threshold_single3:
  value:
    '2014': 10000000
    '2026': 5000000
  i_measure: default
  i_base_year: default
  i_direction: default
  i_increment: default

# Surtax rate for third bracket
rate3:
  value:
    '2014': 0.0
    '2026': 0.12
