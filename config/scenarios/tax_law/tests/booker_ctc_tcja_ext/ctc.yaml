---
# Booker "Keep Your Pay Act" - Sec 204: Monthly CTC (Sec 24A) + Other Dependents Credit (Sec 24B)
# Permanent provision replacing current Sec 24

# Whether SSN is required to qualify for CTC
need_ssn:
  value:
    '2014': 0
    '2018': 1
    '2021': 0
    '2022': 1
    '2026': 0

# Whether to express value for young children in levels
young_level:
  value: 1

# Maximum credit value per "young" child: $360/mo x 12 = $4,320
# Bill indexes $300 monthly amount after Dec 31, 2026 (base year 2025, rounded to $10)
# Annual rounding: $10/mo * 12mo * 1.2 young multiplier = $144
value_young:
  value:
    '2014': [1000, 0]
    '2018': [2000, 0]
    '2021': [2000, 1600]
    '2022': [2000, 0]
    '2025': [2200, 0]
    '2026': [2000, 2320]
  i_measure:
    '1987': cpi
    '2017': chained_cpi
  i_base_year:
    '2014': NA
    '2025': [2024, 2024]
    '2026': [2025, 2025]
  i_direction: [-1, -1]
  i_increment:
    '2014': [100, 100]
    '2026': [100, 144]

# Maximum additional credit value per "young" child
bonus_young:
  value: [0, 0]

# Maximum credit value per "old" child: $300/mo x 12 = $3,600
# Bill indexes $300 monthly amount after Dec 31, 2026 (base year 2025, rounded to $10)
# Annual values: $10 monthly rounding * 12 = $120 annual rounding
# Slot 1: $2,000 floor (phases out at threshold1 = $300K/$400K)
# Slot 2: $1,600 enhancement (phases out at threshold2 = $112.5K/$150K)
# Mirrors ARPA pattern: base in slot 1 at higher threshold, bonus in slot 2 at lower
value_old:
  value:
    '2014': [1000, 0]
    '2018': [2000, 0]
    '2021': [2000, 1000]
    '2022': [2000, 0]
    '2025': [2200, 0]
    '2026': [2000, 1600]
  i_measure:
    '1987': cpi
    '2017': chained_cpi
  i_base_year:
    '2014': NA
    '2025': [2024, 2024]
    '2026': [2025, 2025]
  i_direction: [-1, -1]
  i_increment:
    '2014': [100, 100]
    '2026': [100, 120]

# Maximum age to qualify as "young" child
young_age_limit:
  value: 5

# Maximum age to qualify as an "old" child
old_age_limit:
  value:
    '2014': 16
    '2021': 17
    '2022': 16
    '2026': 17

# AGI threshold above which credit value phases out, single filers
# Slot 1 ($300K): phases out $2K floor — NOT indexed per bill
# Slot 2 ($112.5K): phases out enhancement — indexed after Dec 31, 2025 (base 2023, $5K rounding)
po_thresh_single:
  value:
    '2014': [75000, Inf]
    '2018': [200000, Inf]
    '2021': [200000, 75000]
    '2022': [200000, Inf]
    '2026': [300000, 112500]
  i_measure:
    '1987': cpi
    '2017': chained_cpi
  i_base_year:
    '2014': NA
    '2026': [NA, 2023]
  i_direction: [NA, 0]
  i_increment: [NA, 5000]

# AGI threshold above which credit value phases out, joint filers
# Slot 1 ($400K): phases out $2K floor — NOT indexed
# Slot 2 ($150K): phases out enhancement — indexed after Dec 31, 2025 (base 2023, $5K rounding)
po_thresh_married:
  value:
    '2014': [110000, Inf]
    '2018': [400000, Inf]
    '2021': [400000, 150000]
    '2022': [400000, Inf]
    '2026': [400000, 150000]
  i_measure:
    '1987': cpi
    '2017': chained_cpi
  i_base_year:
    '2014': NA
    '2026': [NA, 2023]
  i_direction: [NA, 0]
  i_increment: [NA, 5000]

# AGI threshold above which credit value phases out, HoH filers
# Slot 1 ($300K): phases out $2K floor — NOT indexed
# Slot 2 ($112.5K): phases out enhancement — indexed after Dec 31, 2025 (base 2023, $5K rounding)
po_thresh_head:
  value:
    '2014': [75000, Inf]
    '2018': [200000, Inf]
    '2021': [200000, 112500]
    '2022': [200000, Inf]
    '2026': [300000, 112500]
  i_measure:
    '1987': cpi
    '2017': chained_cpi
  i_base_year:
    '2014': NA
    '2026': [NA, 2023]
  i_direction: [NA, 0]
  i_increment: [NA, 5000]

# Whether phaseout type is a rate (0 means range)
po_type:
  value: 1

# Phaseout rate
po_rate:
  value: [0.05, 0.05]

# Phaseout rate for non-child dependent credit
po_rate_other:
  value: 0.05

# Additive phaseout mirroring ARPA pattern:
# Slot 1 ($2K floor) phases out at threshold1 ($300K/$400K) — value_other also at threshold1 ✓
# Slot 2 (enhancement) phases out at threshold2 ($112.5K/$150K)
po_sequential:
  value: 0

# Whether phaseout is discretized
po_discrete:
  value: 1

# Rounding step for discretized phaseout
po_discrete_step:
  value: 1000

# Maximum credit value per nonqualifying dependent (Sec 24B: $500)
value_other:
  value:
    '2014': 0
    '2018': 500

# Whether to express minimum refundable CTC in dollar terms
min_refund_level:
  value: 1

# Minimum refundable CTC per qualifying young child (fully refundable)
min_refund_young:
  value:
    '2014': 0
    '2021': 3600
    '2022': 0
    '2026': 4320

# Minimum refundable CTC per qualifying old child (fully refundable)
min_refund_old:
  value:
    '2014': 0
    '2021': 3000
    '2022': 0
    '2026': 3600

# Minimum refundable CTC as a share of total credit
min_refund_share:
  value: 0

# Maximum refundable CTC per young qualifying child (fully refundable)
max_refund_young:
  value:
    '2014': Inf
    '2018': 1400
    '2021': Inf
    '2022': 1400
    '2026': Inf

# Maximum refundable CTC per old qualifying child (fully refundable)
max_refund_old:
  value:
    '2014': Inf
    '2018': 1400
    '2021': Inf
    '2022': 1400
    '2026': Inf

# Whether prior year earned income qualifies for phase-in
ei_prior_yr:
  value: 0

# Whether phase-in type is a rate (0 means range)
pi_type:
  value: 1

# Phase-in rate
pi_rate:
  value: 0.15

# Phase-in range
pi_range:
  value: Inf

# Earned income threshold above which CTC phases in (no threshold)
pi_thresh:
  value:
    '2014': 3000
    '2018': 2500
    '2026': 0

# Fold baby bonus into slot 2 so it goes through the main two-tier phaseout
baby_bonus_in_credit:
  value: 1

# Baby bonus: increment over regular young-child monthly amount in birth month
# (800% - 120%) x $300/mo = $2,040
baby_bonus:
  value:
    '2014': 0
    '2026': 2040

# Phase in rate for baby bonus
baby_bonus_pi_rate:
  value: 0.15

# Phase out rate for baby bonus
baby_bonus_po_rate:
  value: 0.05

# Phase out threshold for baby bonus, joint returns
baby_bonus_po_thresh_married:
  value: 400000
