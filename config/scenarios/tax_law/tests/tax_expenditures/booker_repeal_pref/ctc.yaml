---
# Booker "Keep Your Pay Act" - Sec 204: Monthly CTC (Sec 24A) + Other Dependents Credit (Sec 24B)
# Permanent provision replacing current Sec 24

# Whether SSN is required to qualify for CTC
need_ssn:
  value:
    '2014': 0
    '2018': 1
    '2021': 0
    '2022': 1

# Whether to express value for young children in levels
young_level:
  value: 1

# Maximum credit value per "young" child: $360/mo x 12 = $4,320
# Bill indexes $300 monthly amount after Dec 31, 2026 (base year 2025, rounded to $10)
# Annual rounding: $10/mo * 12mo * 1.2 young multiplier = $144
value_young:
  value:
    '2014': [1000, 0]
    '2018': [2000, 0]
    '2021': [2000, 1600]
    '2022': [2000, 0]
    '2025': [2200, 0]
    '2026': [4320, 0]
  i_measure:
    '1987': cpi
    '2017': chained_cpi
  i_base_year:
    '2014': NA
    '2025': [2024, 2024]
    '2026': [2025, 2025]
  i_direction: [-1, -1]
  i_increment:
    '2014': [100, 100]
    '2026': [144, 144]

# Maximum additional credit value per "young" child
bonus_young:
  value: [0, 0]

# Maximum credit value per "old" child: $300/mo x 12 = $3,600
# Bill indexes $300 monthly amount after Dec 31, 2026 (base year 2025, rounded to $10)
# Annual values: $10 monthly rounding * 12 = $120 annual rounding
value_old:
  value:
    '2014': [1000, 0]
    '2018': [2000, 0]
    '2021': [2000, 1000]
    '2022': [2000, 0]
    '2025': [2200, 0]
    '2026': [3600, 0]
  i_measure:
    '1987': cpi
    '2017': chained_cpi
  i_base_year:
    '2014': NA
    '2025': [2024, 2024]
    '2026': [2025, 2025]
  i_direction: [-1, -1]
  i_increment:
    '2014': [100, 100]
    '2026': [120, 120]

# Maximum age to qualify as "young" child
young_age_limit:
  value: 5

# Maximum age to qualify as an "old" child
old_age_limit:
  value:
    '2014': 16
    '2021': 17
    '2022': 16

# AGI threshold above which credit value phases out, single filers
# Initial threshold indexed after Dec 31, 2025 (base year 2023, rounded to $5,000)
# Secondary threshold ($300K) is NOT indexed per the bill
po_thresh_single:
  value:
    '2014': [75000, Inf]
    '2018': [200000, Inf]
    '2021': [200000, 75000]
    '2022': [200000, Inf]
    '2026': [112500, 300000]
  i_measure:
    '1987': cpi
    '2017': chained_cpi
  i_base_year:
    '2014': NA
    '2026': [2023, NA]
  i_direction: [0, NA]
  i_increment: [5000, NA]

# AGI threshold above which credit value phases out, joint filers
# Initial threshold indexed after Dec 31, 2025 (base year 2023, rounded to $5,000)
# Secondary threshold ($400K) is NOT indexed per the bill
po_thresh_married:
  value:
    '2014': [110000, Inf]
    '2018': [400000, Inf]
    '2021': [400000, 150000]
    '2022': [400000, Inf]
    '2026': [150000, 400000]
  i_measure:
    '1987': cpi
    '2017': chained_cpi
  i_base_year:
    '2014': NA
    '2026': [2023, NA]
  i_direction: [0, NA]
  i_increment: [5000, NA]

# AGI threshold above which credit value phases out, HoH filers
# Initial threshold indexed after Dec 31, 2025 (base year 2023, rounded to $5,000)
# Secondary threshold ($300K) is NOT indexed per the bill
po_thresh_head:
  value:
    '2014': [75000, Inf]
    '2018': [200000, Inf]
    '2021': [200000, 112500]
    '2022': [200000, Inf]
    '2026': [112500, 300000]
  i_measure:
    '1987': cpi
    '2017': chained_cpi
  i_base_year:
    '2014': NA
    '2026': [2023, NA]
  i_direction: [0, NA]
  i_increment: [5000, NA]

# Whether phaseout type is a rate (0 means range)
po_type:
  value: 1

# Phaseout rate
po_rate:
  value: [0.05, 0.05]

# Phaseout rate for non-child dependent credit
po_rate_other:
  value: 0.05

# Sequential phaseout (Sec 24A applies two 5% phaseouts sequentially)
po_sequential:
  value:
    '2014': 0
    '2026': 1

# Whether phaseout is discretized
po_discrete:
  value: 1

# Rounding step for discretized phaseout
po_discrete_step:
  value: 1000

# Maximum credit value per nonqualifying dependent (Sec 24B: $500)
value_other:
  value:
    '2014': 0
    '2018': 500

# Whether to express minimum refundable CTC in dollar terms
min_refund_level:
  value: 1

# Minimum refundable CTC per qualifying young child (fully refundable)
min_refund_young:
  value:
    '2014': 0
    '2021': 3600
    '2022': 0
    '2026': 4320

# Minimum refundable CTC per qualifying old child (fully refundable)
min_refund_old:
  value:
    '2014': 0
    '2021': 3000
    '2022': 0
    '2026': 3600

# Minimum refundable CTC as a share of total credit
min_refund_share:
  value: 0

# Maximum refundable CTC per young qualifying child (fully refundable)
max_refund_young:
  value:
    '2014': Inf
    '2018': 1400
    '2021': Inf
    '2022': 1400
    '2026': Inf

# Maximum refundable CTC per old qualifying child (fully refundable)
max_refund_old:
  value:
    '2014': Inf
    '2018': 1400
    '2021': Inf
    '2022': 1400
    '2026': Inf

# Whether prior year earned income qualifies for phase-in
ei_prior_yr:
  value: 0

# Whether phase-in type is a rate (0 means range)
pi_type:
  value: 1

# Phase-in rate
pi_rate:
  value: 0.15

# Phase-in range
pi_range:
  value: Inf

# Earned income threshold above which CTC phases in (no threshold)
pi_thresh:
  value:
    '2014': 3000
    '2018': 2500
    '2026': 0

# Baby bonus: $2,400 additional refundable credit in birth year
baby_bonus:
  value:
    '2014': 0
    '2026': 2400

# Phase in rate for baby bonus
baby_bonus_pi_rate:
  value: 0.15

# Phase out rate for baby bonus
baby_bonus_po_rate:
  value: 0.05

# Phase out threshold for baby bonus, joint returns
baby_bonus_po_thresh_married:
  value: 400000
